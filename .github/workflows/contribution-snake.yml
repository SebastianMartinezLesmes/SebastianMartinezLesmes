name: Generate Contribution Snake 🐍

on:
  schedule:
    - cron: "0 12 * * *"  # Una vez al día a las 12:00 UTC
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Generate Snake animations
        uses: Platane/snk@v3
        with:
          github_user_name: SebastianMartinezLesmes
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
            dist/github-contribution-grid-snake-ocean.gif?color_snake=#00FFFF&color_dots=#0d1117,#003366,#0055aa,#0077ff,#00aaff

      - name: Push generated files
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
