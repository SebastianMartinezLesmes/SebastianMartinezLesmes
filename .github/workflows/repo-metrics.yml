name: Repository Metrics Dashboard 📊

on:
  schedule:
    - cron: "0 8 * * 1"  # Todos los lunes a las 08:00 UTC
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    name: Generate metrics dashboard

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # ─── Métricas generales del perfil con lowlighter/metrics ────────────────
      - name: Generate profile metrics (base)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: SebastianMartinezLesmes
          template: classic
          base: header, activity, community, repositories, metadata
          output_action: gist                        # guarda en un Gist privado
          committer_gist: ${{ secrets.METRICS_GIST }} # ID del Gist destino
          filename: metrics.svg
          config_timezone: America/Bogota
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_details: bytes-size, percentage
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          plugin_stars: yes
          plugin_stars_limit: 4

      # ─── Métricas de commits y PRs con github-script ─────────────────────────
      - name: Collect repository metrics
        id: metrics
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const username = 'SebastianMartinezLesmes';

            // Repositorios propios
            const { data: repos } = await github.rest.repos.listForUser({
              username, per_page: 100, type: 'owner'
            });

            let totalStars   = 0;
            let totalForks   = 0;
            let totalWatchers = 0;
            const languages  = {};

            for (const repo of repos) {
              totalStars    += repo.stargazers_count;
              totalForks    += repo.forks_count;
              totalWatchers += repo.watchers_count;
              if (repo.language) {
                languages[repo.language] = (languages[repo.language] || 0) + 1;
              }
            }

            // Top 5 lenguajes por número de repos
            const topLangs = Object.entries(languages)
              .sort((a, b) => b[1] - a[1])
              .slice(0, 5)
              .map(([lang, count]) => `\`${lang}\` ×${count}`)
              .join(' · ');

            // Eventos públicos recientes
            const { data: events } = await github.rest.activity.listPublicEventsForUser({
              username, per_page: 100
            });

            const thirtyDaysAgo = new Date(Date.now() - 30 * 24 * 60 * 60 * 1000);
            const recentPushes  = events.filter(e => e.type === 'PushEvent' && new Date(e.created_at) >= thirtyDaysAgo);
            const recentCommits = recentPushes.reduce((s, e) => s + (e.payload.commits?.length || 0), 0);
            const recentPRs     = events.filter(e => e.type === 'PullRequestEvent' && new Date(e.created_at) >= thirtyDaysAgo).length;
            const recentIssues  = events.filter(e => e.type === 'IssuesEvent'      && new Date(e.created_at) >= thirtyDaysAgo).length;

            const now = new Date().toISOString().split('T')[0];

            const dashboard = [
              `> 📅 Última actualización: **${now}** (America/Bogota)`,
              '',
              '| Métrica | Valor |',
              '|---|---|',
              `| 📦 Repositorios públicos | **${repos.length}** |`,
              `| ⭐ Stars totales         | **${totalStars}** |`,
              `| 🍴 Forks totales         | **${totalForks}** |`,
              `| 👁️ Watchers totales      | **${totalWatchers}** |`,
              `| 💬 Commits (30 días)     | **${recentCommits}** |`,
              `| 🔀 Pull Requests (30 días)| **${recentPRs}** |`,
              `| 🐛 Issues (30 días)      | **${recentIssues}** |`,
              `| 🗣️ Top lenguajes         | ${topLangs} |`,
            ].join('\n');

            core.setOutput('dashboard', dashboard);

      # ─── Inyectar dashboard en el README ─────────────────────────────────────
      - name: Update README with metrics dashboard
        env:
          DASHBOARD: ${{ steps.metrics.outputs.dashboard }}
        run: |
          python3 << 'EOF'
          import os, re

          with open('README.md', 'r', encoding='utf-8') as f:
              content = f.read()

          dashboard = os.environ.get('DASHBOARD', '')

          block = (
              "<!-- METRICS-DASHBOARD:START -->\n"
              f"{dashboard}\n"
              "<!-- METRICS-DASHBOARD:END -->"
          )

          if '<!-- METRICS-DASHBOARD:START -->' in content:
              content = re.sub(
                  r'<!-- METRICS-DASHBOARD:START -->.*?<!-- METRICS-DASHBOARD:END -->',
                  block, content, flags=re.DOTALL
              )
          else:
              content += f"\n{block}\n"

          with open('README.md', 'w', encoding='utf-8') as f:
              f.write(content)

          print("Dashboard de métricas actualizado.")
          EOF

      - name: Commit and push metrics
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: update metrics dashboard [skip ci]"
          git push
